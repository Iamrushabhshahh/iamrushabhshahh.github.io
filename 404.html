<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#010409">
    <title>404 · Path not found · Rushabh Shah</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23010409'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='monospace' font-size='38' font-weight='700' fill='%2358a6ff'%3ER%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010409;
            --primary-color: #58a6ff;
            --green-color: #3fb950;
            --border-color: #30363d;
            --text-color: #c9d1d9;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            background-image:
                radial-gradient(800px circle at 10% -10%, rgba(88,166,255,0.10), transparent 50%),
                radial-gradient(600px circle at 95% 20%, rgba(163,113,247,0.08), transparent 50%);
        }
        .terminal {
            max-width: 38rem;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(8px);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .terminal-header {
            background-color: #161b22;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.r { background: #ef4444; } .dot.y { background: #eab308; } .dot.g { background: #22c55e; }
        .body { padding: 2rem; font-family: 'Fira Code', monospace; line-height: 1.7; }
        .prompt { color: var(--green-color); }
        .err { color: #ef4444; font-weight: 700; }
        h1 { font-size: clamp(3rem, 8vw, 5rem); margin: 1rem 0; color: white; line-height: 1; }
        p.lead { color: #8b949e; margin: 0 0 1.5rem; font-family: 'Fira Code', monospace; font-size: 0.95rem; }
        a.home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-color);
            color: var(--bg-color);
            padding: 0.6rem 1.1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 18px -4px rgba(88,166,255,0.45);
        }
        a.home:hover { transform: translateY(-1px); box-shadow: 0 10px 24px -4px rgba(88,166,255,0.6); }
    </style>
</head>
<body>
    <div class="terminal" role="main">
        <div class="terminal-header" aria-hidden="true">
            <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        </div>
        <div class="body">
            <p><span class="prompt">rushabh@shah:~$</span> cd <span style="color:white" id="path">/</span></p>
            <p><span class="err">bash: cd: no such file or directory</span></p>
            <h1>404</h1>
            <p class="lead">The path you followed doesn't exist on this server. Try heading home, or use the nav once you're back.</p>
            <p>
                <a class="home" href="/">
                    <span>cd ~</span>
                </a>
            </p>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('path');
            if (el) el.textContent = window.location.pathname || '/';
        });
    </script>
</body>
</html>

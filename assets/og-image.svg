<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010409"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Terminal frame -->
  <rect x="60" y="60" width="1080" height="510" rx="14" fill="#010409" stroke="#30363d" stroke-width="1.5"/>
  <rect x="60" y="60" width="1080" height="46" rx="14" fill="#161b22"/>
  <rect x="60" y="92" width="1080" height="14" fill="#161b22"/>
  <circle cx="92" cy="83" r="7" fill="#ef4444"/>
  <circle cx="118" cy="83" r="7" fill="#eab308"/>
  <circle cx="144" cy="83" r="7" fill="#22c55e"/>
  <text x="600" y="89" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" fill="#8b949e">rushabhshah.dev</text>

  <!-- Prompt -->
  <text x="110" y="200" font-family="'Fira Code', monospace" font-size="22" fill="#3fb950">rushabh@shah:~$</text>
  <text x="375" y="200" font-family="'Fira Code', monospace" font-size="22" fill="#c9d1d9">whoami</text>

  <!-- Name -->
  <text x="110" y="280" font-family="'Inter', sans-serif" font-size="68" font-weight="700" fill="#ffffff">Rushabh Shah</text>

  <!-- Roles -->
  <text x="110" y="345" font-family="'Fira Code', monospace" font-size="30" fill="#58a6ff">DevOps Engineer</text>

  <!-- Honors badges -->
  <g transform="translate(110, 405)">
    <rect x="0" y="0" width="240" height="56" rx="8" fill="rgba(88,166,255,0.1)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="120" y="36" text-anchor="middle" font-family="'Fira Code', monospace" font-size="20" font-weight="700" fill="#58a6ff">Docker Captain</text>
  </g>
  <g transform="translate(370, 405)">
    <rect x="0" y="0" width="270" height="56" rx="8" fill="rgba(88,166,255,0.1)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="135" y="36" text-anchor="middle" font-family="'Fira Code', monospace" font-size="20" font-weight="700" fill="#58a6ff">Grafana Champion</text>
  </g>

  <!-- Tagline -->
  <text x="110" y="510" font-family="'Inter', sans-serif" font-size="22" fill="#8b949e">Kubernetes · Observability · Cloud · Ahmedabad, India</text>
</svg>
